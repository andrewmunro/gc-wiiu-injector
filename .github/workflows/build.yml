name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs in CI — build an unsigned app.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gc-wiiu-injector-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Publish release
    needs: build
    # Push to main -> rolling "latest" prerelease; push of a v* tag -> versioned release.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Move the `latest` tag to this commit so the rolling release points at it.
      # (The tag name isn't v*, so this push doesn't retrigger the workflow.)
      - name: Update 'latest' tag
        if: github.ref == 'refs/heads/main'
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Rolling 'latest' prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Automated build from the latest commit on `main` (${{ github.sha }}).
            These are unsigned development builds — see the README for install notes.
          files: artifacts/**/*
          fail_on_unmatched_files: false

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
